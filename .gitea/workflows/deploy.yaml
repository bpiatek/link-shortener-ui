name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        options:
          - dev
          - prod
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy to ${{ github.event.inputs.environment }}
    runs-on: java21-build
    env:
      TARGET_ENV: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          settings-path: ${{ github.workspace }}

      - name: Package with Maven
        run: mvn clean package -DskipTests

      - name: Extract Spring Boot Layers
        run: |
          java -Djarmode=layertools -jar target/*.jar extract --destination target/extracted

      - name: Get Image Tag and Name
        id: image_info
        run: |
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "name=link-shortener-notification-service" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          # No secrets needed here anymore. It just copies the layers.
          docker build -t ${{ steps.image_info.outputs.name }}:${{ steps.image_info.outputs.tag }} .
          echo "Docker image built: ${{ steps.image_info.outputs.name }}:${{ steps.image_info.outputs.tag }}"

      - name: Import Image into MicroK8s
        run: |
          docker save ${{ steps.image_info.outputs.name }}:${{ steps.image_info.outputs.tag }} | sudo /snap/bin/microk8s ctr image import -
          echo "Image imported into MicroK8s."

      - name: Run Helm Upgrade
        run: |
          set -euo pipefail
          echo "Deploying with Helm to: $TARGET_ENV"
          sudo /snap/bin/microk8s helm upgrade --install \
            link-shortener-ui-$TARGET_ENV \
            ./helm \
            --namespace $TARGET_ENV \
            --values helm/values-$TARGET_ENV.yaml \
            --set image.repository=${{ steps.image_info.outputs.name }} \
            --set image.tag=${{ steps.image_info.outputs.tag }} \
            --set spring.profiles.active=$TARGET_ENV \
            --atomic \
            --timeout 3m
          echo "Helm deployment finished."